<!doctype html>
<html lang="en">
<head>

<meta name="description" content="Properties ranked by resonance.">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--white:#f4f3ef;--dim:rgba(244,243,239,.62);--faint:rgba(244,243,239,.34);--line:rgba(244,243,239,.22);--pad:clamp(18px,2.7vw,46px);--mono:'DM Mono',ui-monospace,Menlo,monospace;--serif:'Instrument Serif',Georgia,serif}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--mono)}
button,textarea{font:inherit;color:inherit;border:0;background:none}button{cursor:pointer}a{color:inherit;text-decoration:none}
:focus-visible{outline:1px solid var(--white);outline-offset:4px}
.screen{position:fixed;inset:0;display:none;background:var(--bg)}.screen.on{display:block}
.bed{position:absolute;inset:0;overflow:hidden;background:radial-gradient(120% 90% at 70% 35%,#282826 0%,#111 48%,#080808 100%)}
.bed img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;opacity:0;transition:opacity 1.05s ease;filter:none;transform:none;image-rendering:auto}
.bed img.on{opacity:1}
.bed:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.48) 0%,rgba(0,0,0,.02) 31%,rgba(0,0,0,.13) 58%,rgba(0,0,0,.88) 100%),linear-gradient(90deg,rgba(0,0,0,.66) 0%,rgba(0,0,0,.18) 45%,rgba(0,0,0,0) 72%)}
.brand{position:absolute;z-index:10;top:var(--pad);left:var(--pad);font-family:var(--serif);font-size:clamp(30px,3vw,48px);line-height:.8;letter-spacing:.04em;text-transform:uppercase;text-shadow:0 2px 24px rgba(0,0,0,.42)}
.count{position:absolute;z-index:10;top:var(--pad);right:var(--pad);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-variant-numeric:tabular-nums;text-shadow:0 2px 14px #000}
.landing-copy{position:absolute;z-index:10;left:var(--pad);bottom:clamp(190px,25vh,260px);width:min(760px,66vw);text-shadow:0 4px 36px rgba(0,0,0,.72)}
.landing-kicker{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
.landing-copy h1{font-family:var(--serif);font-size:clamp(58px,8vw,132px);line-height:.79;letter-spacing:-.035em;font-weight:400;text-wrap:balance}
.landing-copy p:last-child{margin-top:18px;font-family:var(--serif);font-size:clamp(18px,1.7vw,28px);line-height:1.2;color:rgba(244,243,239,.82)}
.landing-compose{position:absolute;z-index:10;left:var(--pad);right:var(--pad);bottom:var(--pad);max-width:1040px}
.landing-form{display:flex;align-items:flex-end;gap:12px}
.search-box{flex:1;display:flex;align-items:flex-end;background:rgba(7,7,7,.7);backdrop-filter:blur(12px) saturate(1.04);border:1px solid rgba(255,255,255,.34);min-height:72px;padding:14px 16px}
#query{width:100%;min-height:1.2em;max-height:5em;resize:none;overflow:hidden;font-family:var(--serif);font-size:clamp(25px,2.6vw,43px);line-height:1.08;caret-color:var(--white);outline:0}
#query::placeholder{color:rgba(244,243,239,.72)}
.go{width:72px;height:72px;flex:0 0 72px;background:var(--white);color:#080808;display:grid;place-items:center;font-size:22px;transition:opacity .2s}.go:hover{opacity:.78}
.prompt-rail{display:flex;gap:20px;align-items:center;margin-top:12px;min-width:0;overflow-x:auto;scrollbar-width:none}.prompt-rail::-webkit-scrollbar{display:none}
.prompt-label{flex:0 0 auto;font-size:9px;letter-spacing:.19em;text-transform:uppercase;color:var(--faint)}
.prompt{flex:0 0 auto;font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--dim);white-space:nowrap;text-align:left}.prompt:hover{color:var(--white)}
.photo-caption{position:absolute;z-index:9;right:var(--pad);bottom:var(--pad);max-width:34vw;text-align:right;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);text-shadow:0 2px 14px #000}
/* Measure */
#measure .bed:after{background:linear-gradient(180deg,rgba(0,0,0,.56),rgba(0,0,0,.16) 45%,rgba(0,0,0,.78))}
.measuring{position:absolute;z-index:10;inset:0;display:grid;place-items:center;padding:var(--pad);text-align:center}
.measuring div{font-family:var(--serif);font-size:clamp(32px,5vw,82px);line-height:.95;max-width:18ch;text-wrap:balance}
.measure-meta{position:absolute;z-index:10;left:var(--pad);right:var(--pad);bottom:var(--pad);display:flex;justify-content:space-between;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.progress{position:absolute;z-index:10;left:var(--pad);right:var(--pad);bottom:calc(var(--pad) + 26px);height:1px;background:var(--line);overflow:hidden}.progress:after{content:"";position:absolute;left:-25%;width:25%;height:100%;background:var(--white);animation:run 1.2s linear infinite}@keyframes run{to{left:100%}}
/* Results */
#result .bed:after{background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 34%,rgba(0,0,0,.12) 54%,rgba(0,0,0,.92) 100%),linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,0) 48%)}
.result-top{position:absolute;z-index:12;top:var(--pad);left:var(--pad);right:var(--pad);display:flex;justify-content:space-between;align-items:flex-start;gap:24px}
.result-top .brand{position:static}
.nav{display:flex;align-items:center;gap:8px}.position{font-size:10px;letter-spacing:.16em;color:var(--dim);min-width:70px;text-align:right}.nav button{width:38px;height:38px;border:1px solid var(--line);display:grid;place-items:center;background:rgba(0,0,0,.24)}.nav button:hover{background:var(--white);color:#080808}
.result-bottom{position:absolute;z-index:12;left:var(--pad);right:var(--pad);bottom:var(--pad);display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,45vw);align-items:end;gap:36px}
.property{max-width:760px;text-shadow:0 3px 28px rgba(0,0,0,.72)}
.resonance{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}.resonance b{color:var(--white);font-weight:400}
.price{font-family:var(--serif);font-size:clamp(34px,4.6vw,78px);line-height:.84;letter-spacing:-.02em}
.address{margin-top:14px;font-family:var(--serif);font-size:clamp(21px,2.1vw,34px);line-height:1.05;max-width:30ch}
.facts{margin-top:13px;display:flex;flex-wrap:wrap;gap:9px 18px;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--dim)}
.remarks{margin-top:16px;max-width:55ch;font-family:var(--serif);font-size:clamp(16px,1.25vw,21px);line-height:1.35;color:rgba(244,243,239,.82);display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.actions{margin-top:18px;display:flex;gap:8px}.actions a,.actions button{padding:11px 14px;border:1px solid var(--line);font-size:9px;letter-spacing:.16em;text-transform:uppercase;background:rgba(0,0,0,.22)}.actions a:hover,.actions button:hover{background:var(--white);color:#080808}
.deck{min-width:0}.deck-head{display:flex;justify-content:space-between;margin-bottom:9px;font-size:9px;letter-spacing:.17em;text-transform:uppercase;color:var(--dim)}
.tiles{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;scroll-snap-type:x proximity}.tiles::-webkit-scrollbar{display:none}
.tile{position:relative;flex:0 0 clamp(82px,7vw,116px);aspect-ratio:4/3;overflow:hidden;border:1px solid transparent;opacity:.5;scroll-snap-align:start}.tile:hover{opacity:.82}.tile.on{opacity:1;border-color:var(--white)}.tile img{width:100%;height:100%;object-fit:cover;filter:none;transform:none}.tile span{position:absolute;top:5px;left:6px;font-size:8px;text-shadow:0 1px 5px #000}
/* Error */
.error{position:absolute;z-index:20;left:50%;bottom:24px;translate:-50% 0;padding:11px 14px;background:var(--white);color:#080808;font-size:9px;letter-spacing:.12em;text-transform:uppercase;max-width:calc(100vw - 36px);text-align:center}
@media(max-width:820px){
  :root{--pad:16px}.count{top:20px;font-size:8px}.brand{font-size:30px}.landing-copy{left:var(--pad);right:var(--pad);bottom:190px;width:auto}.landing-kicker{font-size:8px;margin-bottom:10px}.landing-copy h1{font-size:clamp(52px,16vw,82px);line-height:.82}.landing-copy p:last-child{font-size:18px;margin-top:12px}.landing-compose{bottom:calc(var(--pad) + env(safe-area-inset-bottom));}.landing-form{gap:8px}.search-box{min-height:60px;padding:12px 13px}#query{font-size:25px}.go{width:60px;height:60px;flex-basis:60px}.prompt-rail{gap:16px;margin-top:10px}.prompt{font-size:8px}.photo-caption{display:none}
  .result-bottom{display:flex;flex-direction:column;align-items:stretch;gap:20px;max-height:72vh;overflow-y:auto;padding-top:120px}.property{max-width:none}.price{font-size:48px}.address{font-size:25px}.remarks{-webkit-line-clamp:2}.deck{width:100%;padding-bottom:calc(env(safe-area-inset-bottom) + 2px)}.tile{flex-basis:88px}.result-top{align-items:center}.position{display:none}
}
@media(max-width:470px){.count{max-width:48vw;text-align:right}.landing-copy{bottom:178px}.landing-copy h1{font-size:50px}.landing-copy p:last-child{font-size:16px;max-width:26ch}.prompt-rail .prompt:nth-of-type(n+3){display:none}.facts{gap:7px 12px}.actions{display:grid;grid-template-columns:1fr}.actions a,.actions button{text-align:center}.result-bottom{bottom:12px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<section class="screen on" id="landing">
  <div class="bed"><img id="landA" class="on" alt=""><img id="landB" alt=""></div>
  <button class="brand" id="landingBrand" type="button">Resonant</button>
  <div class="count" id="landingCount">properties</div>
  <div class="landing-copy">
    <p class="landing-kicker">Real property search</p>
    <h1>Find the place<br>you mean.</h1>
    <p>Real properties ranked against the whole thought.</p>
  </div>
  <div class="landing-compose">
    <form class="landing-form" id="landingForm">
      <div class="search-box"><textarea id="query" rows="1" spellcheck="false" autocomplete="off" enterkeyhint="search" placeholder="A quiet historic home with canyon views and room for music"></textarea></div>
      <button class="go" type="submit" aria-label="Search">→</button>
    </form>
    <div class="prompt-rail" aria-label="Example searches">
      <span class="prompt-label">Try</span>
      <button class="prompt" type="button">historic character near Balboa Park</button>
      <button class="prompt" type="button">privacy, land, and room for family</button>
      <button class="prompt" type="button">bright, walkable, and close to coffee</button>
    </div>
  </div>
  <div class="photo-caption" id="photoCaption"></div>
</section>
<section class="screen" id="measure">
  <div class="bed"><img id="measureImage" class="on" alt=""></div>
  <button class="brand" id="measureBrand" type="button">Resonant</button>
  <div class="measuring"><div id="measureQuery"></div></div>
  <div class="progress"></div>
  <div class="measure-meta"><span>measuring properties</span><span id="elapsed">0.0s</span></div>
</section>
<section class="screen" id="result">
  <div class="bed"><img id="resultImage" class="on" alt=""></div>
  <header class="result-top">
    <button class="brand" id="resultBrand" type="button">Resonant</button>
    <div class="nav"><span class="position" id="position">01 / 10</span><button id="prev" type="button" aria-label="Previous">←</button><button id="next" type="button" aria-label="Next">→</button></div>
  </header>
  <div class="result-bottom">
    <article class="property">
      <div class="resonance" id="scoreLine">resonance <b id="score">—</b></div>
      <div class="price" id="price">—</div>
      <div class="address" id="address">—</div>
      <div class="facts" id="facts"></div>
      <div class="remarks" id="remarks"></div>
      <div class="actions"><a id="openListing" href="#" target="_blank" rel="noopener">open listing ↗</a><button id="newSearch" type="button">new search</button></div>
    </article>
    <aside class="deck"><div class="deck-head"><span>ranked properties</span><span id="resultCount"></span></div><div class="tiles" id="tiles"></div></aside>
  </div>
</section>
<script>
const BUILD='20260721-image-delivery-v3';
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const configured=(params.get('api')||'').replace(/\/+$/,'');
const API_BASE=configured||(location.protocol==='file:'?'http://127.0.0.1:8797':'');
const api=path=>API_BASE+path;
const CAN_PROXY_IMAGES=location.protocol==='https:'&&!configured;
let plate='landing',results=[],index=0,flip=false,timer=null,searchStarted=0,elapsedTimer=null,searching=false;
let landingItems=[],landingFrames=[],landingFrameIndex=0,landingSwapToken=0,landingFailures=0;
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.toggle('on',x.id===id));plate=id}
function money(v){const n=Number(v);return Number.isFinite(n)&&n>0?'$'+Math.round(n).toLocaleString('en-US'):'Price on request'}
function normalizeImageUrl(value){
  if(typeof value!=='string')return'';
  let url=value.trim().replace(/&amp;/g,'&');
  if(!url)return'';
  if(url.startsWith('//'))url='https:'+url;
  if(/^http:\/\//i.test(url))url='https://'+url.slice(7);
  if(!/^https?:\/\//i.test(url))return'';
  try{return new URL(url).href}catch{return''}
}
function photoValue(value,out,depth=0){
  if(depth>4||value==null)return;
  if(typeof value==='string'){const url=normalizeImageUrl(value);if(url)out.push(url);return}
  if(Array.isArray(value)){value.forEach(v=>photoValue(v,out,depth+1));return}
  if(typeof value==='object'){
    const keys=['imageUrl','image_url','primary_photo','primaryPhoto','photoUrl','photo_url','href','url','src','uri','MediaURL','MediaUrl','original','large','highRes','high_res'];
    keys.forEach(k=>{if(k in value)photoValue(value[k],out,depth+1)});
    ['images','photos','alt_photos','altPhotos','media','Media','description','metadata','original_record','extra'].forEach(k=>{if(k in value)photoValue(value[k],out,depth+1)});
  }
}
function imageList(item){
  const raw=[];photoValue(item,raw);
  return [...new Set(raw)].slice(0,40);
}
function deliveryUrls(raw){
  const url=normalizeImageUrl(raw);if(!url)return[];
  const values=[];
  if(CAN_PROXY_IMAGES)values.push('/api/image?url='+encodeURIComponent(url));
  values.push(url);
  return [...new Set(values)];
}
function loadImageElement(img,item){
  const raws=imageList(item);const token=String(Date.now())+Math.random();img.dataset.loadToken=token;
  const candidates=raws.flatMap(deliveryUrls);let at=0;
  const next=()=>{
    if(img.dataset.loadToken!==token)return;
    if(at>=candidates.length){img.removeAttribute('src');img.classList.remove('loaded');return}
    const candidate=candidates[at++];
    img.onload=()=>{if(img.dataset.loadToken===token)img.classList.add('loaded')};
    img.onerror=next;
    img.src=candidate;
  };
  img.alt=(item&&(item.address||item.title))||'Property';next();
}
function makeLandingFrames(items){
  const lists=items.map(item=>({item,images:imageList(item)})).filter(row=>row.images.length);
  const frames=[];
  for(let depth=0;depth<40;depth++){
    for(const row of lists){if(row.images[depth])frames.push({item:row.item,url:row.images[depth]});if(frames.length>=320)return frames}
  }
  return frames;
}
function captionFor(item){const parts=[];if(item&&(item.address||item.title))parts.push(item.address||item.title);if(item&&Number(item.price)>0)parts.push(money(item.price));return parts.join(' · ')}
function preloadFrame(frame,success,failure){
  const candidates=deliveryUrls(frame.url);let at=0;const probe=new Image();probe.decoding='async';
  const next=()=>{if(at>=candidates.length){failure();return}const candidate=candidates[at++];probe.onload=()=>success(candidate);probe.onerror=next;probe.src=candidate};next();
}
function swapLanding(frame,immediate=false){
  if(!frame||!frame.url)return;
  const token=++landingSwapToken;
  preloadFrame(frame,resolved=>{
    if(token!==landingSwapToken)return;
    landingFailures=0;
    const next=flip?$('landA'):$('landB'),old=flip?$('landB'):$('landA');
    next.src=resolved;next.alt=frame.item.address||frame.item.title||'Property';
    if(immediate){next.style.transition='none';next.classList.add('on');old.classList.remove('on');requestAnimationFrame(()=>next.style.transition='')}
    else{requestAnimationFrame(()=>{next.classList.add('on');old.classList.remove('on')})}
    $('photoCaption').textContent=captionFor(frame.item);flip=!flip;
  },()=>{
    if(token!==landingSwapToken)return;
    landingFailures+=1;
    if(landingFailures>=landingFrames.length){$('photoCaption').textContent='property photography unavailable';return}
    setTimeout(advanceLanding,80);
  });
}
function advanceLanding(){if(plate!=='landing'||!landingFrames.length)return;const frame=landingFrames[landingFrameIndex%landingFrames.length];landingFrameIndex=(landingFrameIndex+1)%landingFrames.length;swapLanding(frame)}
function startLandingRotation(){clearInterval(timer);timer=setInterval(advanceLanding,5200)}
function fit(t){t.style.height='auto';t.style.height=Math.min(t.scrollHeight,180)+'px'}
function errorMessage(message){document.querySelectorAll('.error').forEach(x=>x.remove());const node=document.createElement('div');node.className='error';node.textContent=message;document.body.appendChild(node);setTimeout(()=>node.remove(),5200)}
async function postSearch(text,k){
  const r=await fetch(api('/field/v1/search'),{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({text,k})});
  if(!r.ok){let detail='';try{const body=await r.json();detail=body.error||body.detail||''}catch{}throw new Error(detail||'property field unavailable')}
  const d=await r.json();const rows=d.results||d.matches||d.items||[];if(!rows.length)throw new Error('no property results');return{data:d,rows};
}
async function hydrateLanding(){
  try{
    const {rows}=await postSearch('home residence architecture natural light views neighborhood garden character',128);
    const usable=rows.filter(x=>imageList(x).length);
    if(!usable.length)throw new Error('property records contain no photography');
    landingItems=usable;landingFrames=makeLandingFrames(usable);landingFrameIndex=0;landingFailures=0;
    swapLanding(landingFrames[0],true);landingFrameIndex=1;startLandingRotation();
  }catch(err){$('photoCaption').textContent='';errorMessage(err.message||'property images unavailable')}
}
async function manifest(){
  try{const r=await fetch(api('/field/v1/manifest'),{cache:'no-store'});if(!r.ok)throw new Error('property field unavailable');const d=await r.json();const n=Number(d.count||0);if(n<1)throw new Error('property field empty');$('landingCount').textContent=n.toLocaleString('en-US')+' properties'}
  catch(err){$('landingCount').textContent='property field offline';errorMessage(err.message||'property field unavailable')}
}
async function search(q){
  if(searching)return;searching=true;searchStarted=performance.now();show('measure');$('measureQuery').textContent=q;
  const measureItem=landingItems[(landingFrameIndex||0)%Math.max(landingItems.length,1)];loadImageElement($('measureImage'),measureItem);
  elapsedTimer=setInterval(()=>{$('elapsed').textContent=((performance.now()-searchStarted)/1000).toFixed(1)+'s'},100);
  try{const {rows}=await postSearch(q,24);results=rows;index=0;render();show('result')}
  catch(err){show('landing');errorMessage(err.message||'property field unavailable')}
  finally{clearInterval(elapsedTimer);searching=false}
}
function render(){
  const x=results[index];if(!x)return;loadImageElement($('resultImage'),x);
  $('position').textContent=String(index+1).padStart(2,'0')+' / '+String(results.length).padStart(2,'0');
  $('scoreLine').style.display='block';$('score').textContent=Number.isFinite(Number(x.score))?Number(x.score).toFixed(3):'—';
  $('price').textContent=money(x.price);$('address').textContent=x.address||x.title||'Property';
  const facts=[];if(x.bedrooms!=null)facts.push(x.bedrooms+' beds');if(x.bathrooms!=null)facts.push(x.bathrooms+' baths');if(x.squareFeet)facts.push(Number(x.squareFeet).toLocaleString('en-US')+' sqft');if(x.propertyType)facts.push(x.propertyType);if(x.status||x.availability)facts.push(x.status||x.availability);
  $('facts').innerHTML=facts.map(v=>'<span>'+esc(v)+'</span>').join('');$('remarks').textContent=x.overview||x.remarks||'';
  const url=x.externalUrl||x.url||'#';$('openListing').href=url;$('openListing').style.display=url==='#'?'none':'inline-block';$('resultCount').textContent=results.length+' results';
  const tiles=$('tiles');tiles.innerHTML='';
  results.forEach((row,i)=>{const button=document.createElement('button');button.className='tile '+(i===index?'on':'');button.dataset.i=String(i);const img=document.createElement('img');img.alt='';button.appendChild(img);const label=document.createElement('span');label.textContent=String(i+1).padStart(2,'0');button.appendChild(label);button.onclick=()=>{index=i;render()};tiles.appendChild(button);loadImageElement(img,row)});
  const on=tiles.querySelector('.tile.on');if(on)on.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function home(){show('landing');setTimeout(()=>$('query').focus(),0)}
$('landingForm').onsubmit=e=>{e.preventDefault();const q=$('query').value.trim();if(q)search(q)};
$('query').oninput=e=>fit(e.target);
$('query').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();$('landingForm').requestSubmit()}});
document.querySelectorAll('.prompt').forEach(button=>button.addEventListener('click',()=>{$('query').value=button.textContent.trim();fit($('query'));$('landingForm').requestSubmit()}));

<script id="resonant-results-search-progressive">
(() => {
  "use strict";

  const PAGE_SIZE = 10;
  const REQUEST_SIZE = 50;
  const STORAGE_KEY = "resonant:last-property-query";
  const BAR_ATTRIBUTE = "data-resonant-results-search";
  const ITEM_ATTRIBUTE = "data-resonant-progressive-item";

  const state = {
    query: "",
    signature: "",
    cards: [],
    parent: null,
    visible: PAGE_SIZE,
    sentinel: null,
    observer: null,
    scheduled: false,
    applying: false
  };

  function safeStorageGet() {
    try {
      return window.sessionStorage.getItem(STORAGE_KEY) || "";
    } catch {
      return "";
    }
  }

  function safeStorageSet(value) {
    try {
      window.sessionStorage.setItem(STORAGE_KEY, value);
    } catch {
      // Storage is optional.
    }
  }

  function normalizeQuery(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function rememberQuery(value) {
    const query = normalizeQuery(value);

    if (!query) {
      return;
    }

    state.query = query;
    safeStorageSet(query);
  }

  state.query = safeStorageGet();

  function isTextControl(element) {
    if (!(element instanceof HTMLElement)) {
      return false;
    }

    if (element.tagName === "TEXTAREA") {
      return true;
    }

    if (element.tagName !== "INPUT") {
      return false;
    }

    const type = String(element.getAttribute("type") || "text").toLowerCase();

    return ["text", "search", ""].includes(type);
  }

  function isVisible(element) {
    if (!(element instanceof HTMLElement)) {
      return false;
    }

    const style = window.getComputedStyle(element);

    if (
      style.display === "none" ||
      style.visibility === "hidden" ||
      Number(style.opacity) === 0
    ) {
      return false;
    }

    const rect = element.getBoundingClientRect();

    return rect.width > 0 && rect.height > 0;
  }

  function searchControlScore(element) {
    if (!isTextControl(element)) {
      return -1;
    }

    if (element.closest(`[${BAR_ATTRIBUTE}]`)) {
      return -1;
    }

    const haystack = [
      element.id,
      element.className,
      element.getAttribute("name"),
      element.getAttribute("placeholder"),
      element.getAttribute("aria-label"),
      element.getAttribute("autocomplete")
    ]
      .filter(Boolean)
      .join(" ")
      .toLowerCase();

    let score = 0;

    if (/search|find|property|home|describe|looking|want|query|summon/.test(haystack)) {
      score += 8;
    }

    if (element.tagName === "INPUT" && element.type === "search") {
      score += 4;
    }

    if (isVisible(element)) {
      score += 3;
    }

    if (element.form) {
      score += 2;
    }

    return score;
  }

  function originalSearchControls() {
    return [...document.querySelectorAll(
      'input:not([type]), input[type="text"], input[type="search"], textarea'
    )]
      .filter(element => !element.closest(`[${BAR_ATTRIBUTE}]`))
      .map(element => ({
        element,
        score: searchControlScore(element)
      }))
      .filter(entry => entry.score >= 0)
      .sort((a, b) => b.score - a.score)
      .map(entry => entry.element);
  }

  function currentTypedQuery() {
    const active = document.activeElement;

    if (isTextControl(active)) {
      const value = normalizeQuery(active.value);

      if (value) {
        return value;
      }
    }

    for (const control of originalSearchControls()) {
      const value = normalizeQuery(control.value);

      if (value) {
        return value;
      }
    }

    const injected = document.querySelector(
      `[${BAR_ATTRIBUTE}] input[type="search"]`
    );

    if (injected) {
      const value = normalizeQuery(injected.value);

      if (value) {
        return value;
      }
    }

    return state.query;
  }

  function setControlValue(control, value) {
    if (!isTextControl(control)) {
      return;
    }

    if (document.activeElement === control && normalizeQuery(control.value)) {
      return;
    }

    if (control.value === value) {
      return;
    }

    if (control instanceof HTMLInputElement) {
      const descriptor = Object.getOwnPropertyDescriptor(
        window.HTMLInputElement.prototype,
        "value"
      );

      if (descriptor?.set) {
        descriptor.set.call(control, value);
      } else {
        control.value = value;
      }
    } else {
      control.value = value;
    }

    control.dispatchEvent(new Event("input", {
      bubbles: true
    }));

    control.dispatchEvent(new Event("change", {
      bubbles: true
    }));
  }

  function cardTextScore(element) {
    if (!(element instanceof HTMLElement)) {
      return -100;
    }

    if (
      ["SCRIPT", "STYLE", "TEMPLATE", "NOSCRIPT"].includes(element.tagName)
    ) {
      return -100;
    }

    const text = normalizeQuery(element.innerText).slice(0, 1200);

    if (!text || text.length < 18) {
      return -100;
    }

    let score = 0;

    if (element.matches(
      [
        "[data-result]",
        "[data-property]",
        ".result-card",
        ".property-card",
        ".listing-card",
        ".property-result",
        ".search-result",
        ".result-item"
      ].join(",")
    )) {
      score += 20;
    }

    if (element.querySelector("img, picture")) {
      score += 5;
    }

    if (element.querySelector("a[href], button")) {
      score += 2;
    }

    if (/\$[\d,.]+/.test(text)) {
      score += 5;
    }

    if (/\b(bed|beds|bath|baths|sq\.?\s*ft|acre|resonance|score)\b/i.test(text)) {
      score += 4;
    }

    if (text.length > 55) {
      score += 2;
    }

    return score;
  }

  function groupSignature(cards) {
    return [
      cards.length,
      ...cards.slice(0, 4).map(card =>
        normalizeQuery(card.innerText).slice(0, 90)
      )
    ].join("|");
  }

  function collectExplicitGroups() {
    const selector = [
      "[data-result]",
      "[data-property]",
      ".result-card",
      ".property-card",
      ".listing-card",
      ".property-result",
      ".search-result",
      ".result-item"
    ].join(",");

    const groups = new Map();

    for (const card of document.querySelectorAll(selector)) {
      if (!(card instanceof HTMLElement)) {
        continue;
      }

      if (card.closest(`[${BAR_ATTRIBUTE}]`)) {
        continue;
      }

      const parent = card.parentElement;

      if (!parent) {
        continue;
      }

      if (!groups.has(parent)) {
        groups.set(parent, []);
      }

      groups.get(parent).push(card);
    }

    return [...groups.entries()].map(([parent, cards]) => ({
      parent,
      cards,
      score: cards.length * 30 +
        cards.reduce((sum, card) => sum + Math.max(0, cardTextScore(card)), 0)
    }));
  }

  function collectGenericGroups() {
    const selectors = [
      "main",
      "section",
      '[id*="result" i]',
      '[class*="result" i]',
      '[id*="listing" i]',
      '[class*="listing" i]',
      '[id*="property" i]',
      '[class*="property" i]',
      '[class*="grid" i]',
      '[class*="cards" i]'
    ].join(",");

    const groups = [];

    for (const parent of document.querySelectorAll(selectors)) {
      if (!(parent instanceof HTMLElement)) {
        continue;
      }

      if (parent.closest(`[${BAR_ATTRIBUTE}]`)) {
        continue;
      }

      const cards = [...parent.children].filter(child =>
        child instanceof HTMLElement &&
        cardTextScore(child) >= 5
      );

      if (cards.length < 2) {
        continue;
      }

      const score = cards.length * 10 +
        cards.reduce((sum, card) => sum + cardTextScore(card), 0);

      groups.push({
        parent,
        cards,
        score
      });
    }

    return groups;
  }

  function findResultGroup() {
    const groups = [
      ...collectExplicitGroups(),
      ...collectGenericGroups()
    ]
      .filter(group =>
        group.cards.length >= 2 &&
        group.parent.isConnected
      )
      .sort((a, b) => b.score - a.score);

    return groups[0] || null;
  }

  function disconnectObserver() {
    if (state.observer) {
      state.observer.disconnect();
      state.observer = null;
    }
  }

  function revealNextPage() {
    if (!state.cards.length || state.visible >= state.cards.length) {
      return;
    }

    state.visible = Math.min(
      state.visible + PAGE_SIZE,
      state.cards.length
    );

    applyCardVisibility();
  }

  function installSentinel() {
    if (!state.parent || !state.cards.length) {
      return;
    }

    if (!state.sentinel || !state.sentinel.isConnected) {
      state.sentinel = document.createElement("div");
      state.sentinel.className = "resonant-progressive-sentinel";
      state.sentinel.setAttribute("aria-hidden", "true");
      state.parent.appendChild(state.sentinel);
    }

    disconnectObserver();

    if (state.visible >= state.cards.length) {
      state.sentinel.hidden = true;
      return;
    }

    state.sentinel.hidden = false;

    state.observer = new IntersectionObserver(entries => {
      if (entries.some(entry => entry.isIntersecting)) {
        revealNextPage();
      }
    }, {
      root: null,
      rootMargin: "700px 0px",
      threshold: 0
    });

    state.observer.observe(state.sentinel);
  }

  function applyCardVisibility() {
    state.applying = true;

    try {
      state.cards.forEach((card, index) => {
        card.setAttribute(ITEM_ATTRIBUTE, "");
        card.hidden = index >= state.visible;
      });

      installSentinel();
    } finally {
      state.applying = false;
    }
  }

  function resultSearchTarget(group) {
    const closest = group.parent.closest(
      'main, section, [id*="result" i], [class*="result" i]'
    );

    return closest || group.parent;
  }

  function triggerExistingSearch(query) {
    rememberQuery(query);

    const controls = originalSearchControls();
    const target = controls[0] || null;

    if (!target) {
      return false;
    }

    setControlValue(target, query);

    const form = target.form || target.closest("form");

    if (form) {
      if (typeof form.requestSubmit === "function") {
        form.requestSubmit();
      } else {
        form.dispatchEvent(new Event("submit", {
          bubbles: true,
          cancelable: true
        }));
      }

      return true;
    }

    target.dispatchEvent(new KeyboardEvent("keydown", {
      key: "Enter",
      code: "Enter",
      bubbles: true,
      cancelable: true
    }));

    target.dispatchEvent(new KeyboardEvent("keyup", {
      key: "Enter",
      code: "Enter",
      bubbles: true,
      cancelable: true
    }));

    const button = [...document.querySelectorAll(
      'button, input[type="submit"], [role="button"]'
    )].find(element => {
      if (element.closest(`[${BAR_ATTRIBUTE}]`)) {
        return false;
      }

      const label = normalizeQuery(
        element.innerText ||
        element.value ||
        element.getAttribute("aria-label")
      ).toLowerCase();

      return /search|find|summon|show|go/.test(label);
    });

    if (button) {
      button.click();
      return true;
    }

    return false;
  }

  function ensureInjectedSearch(group) {
    const target = resultSearchTarget(group);
    const existingVisibleControl = originalSearchControls().find(isVisible);

    if (existingVisibleControl) {
      setControlValue(existingVisibleControl, state.query);
      document.querySelector(`[${BAR_ATTRIBUTE}]`)?.remove();
      return;
    }

    let form = document.querySelector(`[${BAR_ATTRIBUTE}]`);

    if (!form) {
      form = document.createElement("form");
      form.className = "resonant-results-search";
      form.setAttribute(BAR_ATTRIBUTE, "");
      form.setAttribute("role", "search");
      form.innerHTML = [
        '<input type="search" aria-label="Search properties"',
        ' autocomplete="off" spellcheck="false">',
        '<button type="submit">Search</button>'
      ].join("");

      form.addEventListener("submit", event => {
        event.preventDefault();

        const input = form.querySelector('input[type="search"]');
        const query = normalizeQuery(input?.value);

        if (!query) {
          input?.focus();
          return;
        }

        if (!triggerExistingSearch(query)) {
          window.location.assign(
            `/?q=${encodeURIComponent(query)}`
          );
        }
      });
    }

    const input = form.querySelector('input[type="search"]');

    if (
      input &&
      document.activeElement !== input &&
      input.value !== state.query
    ) {
      input.value = state.query;
    }

    if (!form.isConnected || form.nextElementSibling !== target) {
      target.parentElement?.insertBefore(form, target);
    }
  }

  function sync() {
    state.scheduled = false;

    if (state.applying) {
      return;
    }

    const typed = currentTypedQuery();

    if (typed) {
      rememberQuery(typed);
    }

    const group = findResultGroup();

    if (!group) {
      disconnectObserver();
      document.querySelector(`[${BAR_ATTRIBUTE}]`)?.remove();
      return;
    }

    const signature = groupSignature(group.cards);

    if (
      signature !== state.signature ||
      group.parent !== state.parent
    ) {
      disconnectObserver();

      for (const oldCard of state.cards) {
        oldCard.hidden = false;
        oldCard.removeAttribute(ITEM_ATTRIBUTE);
      }

      state.signature = signature;
      state.parent = group.parent;
      state.cards = group.cards;
      state.visible = PAGE_SIZE;
      state.sentinel?.remove();
      state.sentinel = null;
    } else {
      state.cards = group.cards;
    }

    for (const control of originalSearchControls()) {
      if (!normalizeQuery(control.value)) {
        setControlValue(control, state.query);
      }
    }

    ensureInjectedSearch(group);
    applyCardVisibility();
  }

  function scheduleSync() {
    if (state.scheduled) {
      return;
    }

    state.scheduled = true;
    window.setTimeout(sync, 80);
  }

  document.addEventListener("input", event => {
    if (!isTextControl(event.target)) {
      return;
    }

    const value = normalizeQuery(event.target.value);

    if (value) {
      rememberQuery(value);
    }
  }, true);

  document.addEventListener("submit", event => {
    const control = event.target?.querySelector?.(
      'input[type="search"], input[type="text"], input:not([type]), textarea'
    );

    if (control) {
      rememberQuery(control.value);
    }

    scheduleSync();
  }, true);

  document.addEventListener("click", event => {
    const button = event.target?.closest?.(
      'button, input[type="submit"], [role="button"]'
    );

    if (!button) {
      return;
    }

    const label = normalizeQuery(
      button.innerText ||
      button.value ||
      button.getAttribute("aria-label")
    ).toLowerCase();

    if (/search|find|summon|show|go/.test(label)) {
      rememberQuery(currentTypedQuery());
      scheduleSync();
    }
  }, true);

  const originalFetch = window.fetch.bind(window);

  window.fetch = async function resonantFetch(input, init) {
    let nextInit = init;

    const url = typeof input === "string"
      ? input
      : input instanceof URL
        ? input.href
        : input?.url || "";

    if (
      String(url).includes("/field/v1/search") &&
      init &&
      typeof init.body === "string"
    ) {
      try {
        const payload = JSON.parse(init.body);
        const query = normalizeQuery(payload.text);

        if (query) {
          rememberQuery(query);
        }

        payload.k = Math.max(
          Number(payload.k || 0),
          REQUEST_SIZE
        );

        nextInit = {
          ...init,
          body: JSON.stringify(payload)
        };
      } catch {
        // Preserve the original request when the body is not JSON.
      }
    }

    const response = await originalFetch(input, nextInit);
    scheduleSync();

    return response;
  };

  const mutationObserver = new MutationObserver(() => {
    scheduleSync();
  });

  function start() {
    mutationObserver.observe(document.documentElement, {
      childList: true,
      subtree: true
    });

    scheduleSync();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, {
      once: true
    });
  } else {
    start();
  }
})();
</script>

<script id="resonant-image-fix-script">
(() => {
  "use strict";
  const seen = new Set();
  const q = (s, r = document) => Array.from(r.querySelectorAll(s));
  const norm = (u) => (u ? String(u).trim().replace(/^['"]|['"]$/g, "") : "");
  const real = (u) => !!u && !/^data:/i.test(u) && !/undefined|null|none|placeholder/i.test(u);

  function preload(url, high = false){
    url = norm(url);
    if(!real(url) || seen.has(url)) return;
    seen.add(url);
    try{
      const link = document.createElement("link");
      link.rel = "preload";
      link.as = "image";
      link.href = url;
      if(high) link.setAttribute("fetchpriority","high");
      document.head.appendChild(link);
    }catch(_){}
    try{
      const img = new Image();
      if(high && "fetchPriority" in img) img.fetchPriority = "high";
      img.decoding = "async";
      img.src = url;
    }catch(_){}
  }

  function bg(el){
    const direct = el?.dataset?.imageUrl || el?.dataset?.image || el?.getAttribute?.("data-image-url") || el?.getAttribute?.("data-image");
    if(real(direct)) return direct;
    const value = el ? getComputedStyle(el).backgroundImage : "";
    const m = /url\((['"]?)(.*?)\1\)/i.exec(value || "");
    return m && m[2] ? m[2] : "";
  }

  function cardLike(node){
    if(!(node instanceof HTMLElement)) return false;
    const r = node.getBoundingClientRect();
    if(r.width < 48 || r.height < 48) return false;
    return /card|tile|thumb|hero|result|ranked|listing|photo|image/i.test(
      [node.className || "", node.id || "", node.getAttribute("data-role") || ""].join(" ")
    );
  }

  function fallback(node){
    if(!(node instanceof HTMLElement)) return;
    if(node.dataset.resonantFallbackApplied === "1") return;
    node.dataset.resonantFallbackApplied = "1";
    node.classList.add("resonant-image-fallback");
  }

  function hydrate(){
    const imgs = q("img");
    imgs.forEach((img, i) => {
      const src = norm(img.currentSrc || img.src);
      if(i < 6){
        try{ img.loading = "eager"; }catch(_){}
        try{ img.decoding = "async"; }catch(_){}
        if("fetchPriority" in img) img.fetchPriority = i === 0 ? "high" : "auto";
      }
      if(real(src)) preload(src, i === 0);
      else if(cardLike(img.parentElement)) fallback(img.parentElement);
      img.addEventListener("error", () => fallback(img.parentElement), { once:true });
    });

    let first = false;
    q("[style*='background'], [data-image], [data-image-url]").forEach((node) => {
      const src = norm(bg(node));
      if(real(src)){
        preload(src, !first);
        first = true;
      }else if(cardLike(node)){
        fallback(node);
      }
    });
  }

  function reorder(){
    const parents = new Set();
    q("[data-resonant-progressive-item], .ranked-properties > *, .ranked-properties .card, .ranked-properties .tile, .ranked-properties .thumb")
      .filter(cardLike)
      .forEach(node => node.parentElement && parents.add(node.parentElement));

    parents.forEach(parent => {
      const kids = Array.from(parent.children);
      if(kids.length < 2) return;
      const withImg = [], withoutImg = [];
      kids.forEach(kid => {
        const img = kid.querySelector("img");
        const src = norm(img?.currentSrc || img?.src || bg(kid));
        (real(src) ? withImg : withoutImg).push(kid);
      });
      if(!withImg.length || !withoutImg.length) return;
      [...withImg, ...withoutImg].forEach(k => parent.appendChild(k));
    });
  }

  function run(){
    hydrate();
    reorder();
  }

  let scheduled = false;
  function schedule(){
    if(scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => {
      scheduled = false;
      run();
    });
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", schedule, { once:true });
  else schedule();

  window.addEventListener("load", schedule, { once:true });

  new MutationObserver(schedule).observe(document.documentElement, {
    subtree:true,
    childList:true,
    attributes:true,
    attributeFilter:["style","src","data-image","data-image-url"]
  });
})();
</script>
