name: validate

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: python -m py_compile bin/*.py
      - name: Check shell syntax
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
          for file in *.command; do
            zsh -n "$file"
          done
      - name: Verify frontend contract
        run: |
          grep -q '/field/v1/search' web/index.html
          grep -q 'requestSubmit' web/index.html
          ! grep -q 'const SEED' web/index.html
